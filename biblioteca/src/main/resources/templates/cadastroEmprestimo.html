<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Empréstimo</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body>

        <div class="container">
            <div class="header">
                <h1>Empréstimo</h1>
                <a th:href="@{/menu}" class="btn">Menu</a>
            </div>

            <div class="form-container">
                <form th:action="@{/emprestimos}" method="post">
                    <input type="number" name="usuario.id" placeholder="ID Usuário">
                    <input type="number" name="livro.id" placeholder="ID Livro">
                    <input type="date" name="dataEmprestimo">
                    <button class="btn">Salvar</button>
                </form>
            </div>
        </div>

        <script th:src="@{/js/script.js}"></script>
    </body>
</html>
