<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Menu</title>

        <link rel="stylesheet" th:href="@{/css/menu.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>

        <div class="menu-container">

            <div class="menu-header">
                <h1>📚 Library System</h1>
                <button href="/" class="logout-btn">Sair</button>
            </div>

            <div class="menu-grid">

                <a th:href="@{/livros/novo}" class="menu-card">
                    <i class="fas fa-plus"></i>
                    <p>Cadastrar Livro</p>
                </a>

                <a th:href="@{/usuarios/novo}" class="menu-card">
                    <i class="fas fa-user-plus"></i>
                    <p>Cadastrar Usuário</p>
                </a>

                <a th:href="@{/emprestimos/novo}" class="menu-card">
                    <i class="fas fa-handshake"></i>
                    <p>Registrar Empréstimo</p>
                </a>

                <a th:href="@{/livros}" class="menu-card">
                    <i class="fas fa-book"></i>
                    <p>Listar Livros</p>
                </a>

                <a th:href="@{/usuarios}" class="menu-card">
                    <i class="fas fa-users"></i>
                    <p>Listar Usuários</p>
                </a>

                <a th:href="@{/emprestimos}" class="menu-card">
                    <i class="fas fa-list"></i>
                    <p>Listar Empréstimos</p>
                </a>

            </div>

        </div>

    </body>
</html>
