<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Cadastrar Usuário</title>

        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>

        <div class="container">

            <div class="header">
                <h1><i class="fas fa-user-plus"></i> Cadastrar Usuário</h1>
                <a th:href="@{/menu}" class="btn">Voltar</a>
            </div>

            <div class="form-container">

                <form th:action="@{/usuarios}" method="post" id="userForm">

                    <div class="input-group">
                        <label for="nome">Nome *</label>
                        <input type="text" id="nome" name="nome" placeholder="Nome completo">
                        <span class="error-message" id="nomeError"></span>
                    </div>

                    <div class="input-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" placeholder="usuario@email.com">
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="input-group">
                        <label for="cpf">CPF *</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
                        <span class="error-message" id="cpfError"></span>
                    </div>

                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> Cadastrar Usuário
                    </button>

                </form>

            </div>

        </div>

        <script th:src="@{/js/script.js}"></script>

    </body>
</html>
