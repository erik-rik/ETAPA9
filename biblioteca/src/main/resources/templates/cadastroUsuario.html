<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Cadastrar Usuário</title>

        <link rel="stylesheet" th:href="@{/css/style.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>
    <body>

        <div class="container">

            <div class="header">
                <h1>
                    <i class="fas fa-user-plus"></i> 
                    <span th:text="${usuario.id == 0} ? 'Cadastrar Usuário' : 'Editar Usuário'"></span>
                </h1>
                <a th:href="@{/usuarios}" class="btn">Voltar</a>
            </div>

            <div class="form-container">

                <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post" id="userForm">

                    <input type="hidden" th:field="*{id}">

                    <div class="input-group">
                        <label>Nome *</label>
                        <input type="text" th:field="*{nome}" placeholder="Nome completo">
                        <span class="error-message" id="nomeError"></span>
                    </div>

                    <div class="input-group">
                        <label>Email *</label>
                        <input type="email" th:field="*{email}" placeholder="usuario@email.com">
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="input-group">
                        <label>CPF *</label>
                        <input type="text" th:field="*{cpf}" placeholder="000.000.000-00">
                        <span class="error-message" id="cpfError"></span>
                    </div>

                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i> Salvar
                    </button>

                </form>

            </div>

        </div>

        <script th:src="@{/js/script.js}"></script>

    </body>
</html>
